teams:
  SecOps:
    users:
      - admin
      - Test1
    fallback_user: admin
  SOC-Linux:
    users:
      - dan
      - emma
      - Test1
    fallback_user: admin
  AppSec:
    users:
      - frank
      - grace
      - Test1
