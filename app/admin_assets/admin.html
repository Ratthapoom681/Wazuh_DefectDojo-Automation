<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wazuh to DefectDojo Admin</title>
  <link rel="stylesheet" href="/admin/assets/admin.css" />
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div>
        <p class="eyebrow">Admin Console</p>
        <h1>Wazuh to DefectDojo</h1>
        <p class="lede">Configure local routing and DefectDojo destination paths from one place.</p>
      </div>
      <div class="hero-actions">
        <button class="ghost" id="reloadBtn">Reload</button>
        <button class="primary" id="saveBtn">Save Config</button>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="layout">
      <section class="panel">
        <h2>Destination Path</h2>
        <div class="form-grid">
          <div class="field">
            <label for="productTypeSelect">Product Type</label>
            <select id="productTypeSelect"></select>
          </div>
          <div class="field">
            <label for="productTypeDescription">Product Type Description</label>
            <input id="productTypeDescription" />
          </div>
          <div class="field">
            <label for="productSelect">Product</label>
            <select id="productSelect"></select>
          </div>
          <div class="field">
            <label for="productDescription">Product Description</label>
            <input id="productDescription" />
          </div>
          <div class="field">
            <label for="engagementSelect">Engagement</label>
            <select id="engagementSelect"></select>
          </div>
          <div class="field">
            <label for="engagementStatus">Engagement Status</label>
            <input id="engagementStatus" />
          </div>
          <div class="field">
            <label for="engagementStart">Engagement Start</label>
            <input id="engagementStart" />
          </div>
          <div class="field">
            <label for="engagementEnd">Engagement End</label>
            <input id="engagementEnd" />
          </div>
          <div class="field">
            <label for="testTitlePrefix">Test Title Prefix</label>
            <input id="testTitlePrefix" />
          </div>
          <div class="field">
            <label for="testTypeId">Test Type ID</label>
            <input id="testTypeId" type="number" />
          </div>
        </div>

        <h3>Category to Test Path</h3>
        <div class="category-grid">
          <div class="field">
            <label for="threatHuntingTest">Threat Hunting Test Category</label>
            <input id="threatHuntingTest" />
          </div>
          <div class="field">
            <label for="vulnerabilityTest">Vulnerability Detector Test Category</label>
            <input id="vulnerabilityTest" />
          </div>
          <div class="field full">
            <label for="defaultTest">Default Test Category</label>
            <input id="defaultTest" />
          </div>
        </div>

        <h3>Routing and Teams</h3>
        <div class="field">
          <label for="teams">Teams (JSON)</label>
          <textarea id="teams"></textarea>
        </div>
        <div class="field">
          <label for="routingRules">Routing Rules (JSON)</label>
          <textarea id="routingRules"></textarea>
        </div>
        <div class="field">
          <label for="tagRules">Tag Rules (JSON)</label>
          <textarea id="tagRules"></textarea>
        </div>
      </section>

      <section class="panel">
        <h2>DefectDojo Inventory</h2>
        <div class="inventory" id="inventory"></div>
      </section>

      <section class="panel">
        <h2>Create DefectDojo Objects</h2>
        <div class="create-grid">
          <form class="create-card" data-object-type="product-type">
            <h3>New Product Type</h3>
            <input name="name" placeholder="Infrastructure" required />
            <input name="description" placeholder="Description" />
            <button class="primary" type="submit">Create Product Type</button>
          </form>

          <form class="create-card" data-object-type="product">
            <h3>New Product</h3>
            <input name="name" placeholder="Wazuh Endpoint Security" required />
            <input name="description" placeholder="Description" required />
            <input name="prod_type" type="number" placeholder="Product Type ID" required />
            <button class="primary" type="submit">Create Product</button>
          </form>

          <form class="create-card" data-object-type="engagement">
            <h3>New Engagement</h3>
            <input name="name" placeholder="Continuous Monitoring" />
            <input name="product" type="number" placeholder="Product ID" required />
            <input name="target_start" placeholder="2026-03-19" required />
            <input name="target_end" placeholder="2027-03-19" required />
            <input name="status" placeholder="In Progress" />
            <button class="primary" type="submit">Create Engagement</button>
          </form>

          <form class="create-card" data-object-type="test">
            <h3>New Test</h3>
            <input name="title" placeholder="Threat Hunting" />
            <input name="engagement" type="number" placeholder="Engagement ID" required />
            <input name="test_type" type="number" placeholder="Test Type ID" required />
            <input name="target_start" placeholder="2026-03-19T00:00:00Z" required />
            <input name="target_end" placeholder="2027-03-19T00:00:00Z" required />
            <button class="primary" type="submit">Create Test</button>
          </form>

          <form class="create-card" data-object-type="user">
            <h3>New User</h3>
            <input name="username" placeholder="WindowsTest1" required />
            <input name="email" placeholder="windows@example.com" required />
            <input name="first_name" placeholder="First name" />
            <input name="last_name" placeholder="Last name" />
            <button class="primary" type="submit">Create User</button>
          </form>
        </div>
      </section>
    </div>
  </div>
  <script src="/admin/assets/admin.js"></script>
</body>
</html>
